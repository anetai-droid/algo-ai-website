<script>document.documentElement.classList.add('js')</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ page.title }}</title>
<meta name="description" content="{{ page.description }}" />
<link rel="canonical" href="{{ page.canonical }}" />
{{#if page.noindex}}
<meta name="robots" content="noindex, nofollow" />
{{else}}
<meta name="robots" content="index, follow" />
{{/if}}

<!-- OGP -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="{{ site.name }}" />
<meta property="og:title" content="{{ page.title }}" />
<meta property="og:description" content="{{ page.description }}" />
<meta property="og:url" content="{{ page.canonical }}" />
<meta property="og:image" content="{{ page.ogImage }}" />
<meta property="og:locale" content="ja_JP" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{ page.title }}" />
<meta name="twitter:description" content="{{ page.description }}" />
<meta name="twitter:image" content="{{ page.ogImage }}" />

<!-- favicon -->
<link rel="icon" href="/favicon.png" type="image/png" />
<link rel="apple-touch-icon" href="/favicon.png" />
<link rel="manifest" href="/site.webmanifest" />
<meta name="theme-color" content="#1b3f6e" />

<!-- フォント -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@600;700&family=Roboto+Mono:wght@500&display=swap"
  rel="stylesheet"
/>

<!-- 組織情報の構造化データ（全ページ共通） -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "@id": "{{ siteUrl }}/#organization",
  "name": "あるご合同会社",
  "alternateName": "Algo AI",
  "url": "{{ siteUrl }}",
  "logo": "{{ siteUrl }}/favicon.png",
  "description": "AI導入支援・AI開発・業務効率化支援サービス「Algo AI」を提供する合同会社。",
  "areaServed": "JP",
  "knowsLanguage": "ja"
}
</script>

{{#if gaId}}
<!-- Google Analytics 4（VITE_GA4_ID 設定時のみ出力） -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ gaId }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ gaId }}');
</script>
{{/if}}

{{#if hotjarId}}
<!-- Hotjar（VITE_HOTJAR_ID 設定時のみ出力） -->
<script>
  (function(h,o,t,j,a,r){
    h.hj=h.hj||function(){(h.hj.q=h.hj.q||[]).push(arguments)};
    h._hjSettings={hjid:{{ hotjarId }},hjsv:6};
    a=o.getElementsByTagName('head')[0];
    r=o.createElement('script');r.async=1;
    r.src=t+h._hjSettings.hjid+j+h._hjSettings.hjsv;
    a.appendChild(r);
  })(window,document,'https://static.hotjar.com/c/hotjar-','.js?sv=');
</script>
{{/if}}

<!-- スタイル & スクリプト（Viteがバンドル） -->
<script type="module" src="/src/js/main.js"></script>
